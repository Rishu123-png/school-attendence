<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard — School Attendance</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="initDashboardPage()">



<!-- ☰ Menu Button -->
<button id="menuToggle" class="menu-btn">➡️</button>

<!-- Overlay -->
<div id="sidebarOverlay" class="sidebar-overlay"></div>

<!-- Sidebar -->
<div id="sidebar" class="sidebar">

<main class="container">


  <div class="sidebar-header">
    <!-- ✅ FIXED IMAGE -->
    <img src="file_000000000b80720891a13f8f2b0b0935.png" class="sidebar-logo">

    <!-- ✅ UNIQUE IDs -->
    <h3 id="teacherName">Teacher Name</h3>
    <p id="teacherSubject">Subject</p>
  </div>

  <div class="sidebar-menu">
    <button onclick="location.href='dashboard.html'">🏠 Dashboard</button>
    <button onclick="location.href='mark-attendance.html'">📅 Attendance</button>
    <button onclick="location.href='marks.html'">📊 Marks</button>
    <button id="themeToggle">🌙 Toggle Theme</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>

</div>

<!-- 🔹 HEADER -->
<header class="header">

  <div>
    <!-- ✅ FIXED TEXT -->
    <h1>Welcome, <span id="teacherNameDisplay">Teacher</span></h1>
  </div>

  <div class="top-controls">
    <select id="classSelect" style="min-width:160px;">
      <option value="">-- Select class --</option>
    </select>
  </div>

</header>

<!-- 🔹 CONTENT -->
<div class="grid">

  <div class="card">
    <h3>Quick Actions</h3>
    <p>Add students, mark attendance and manage marks.</p>

    <div class="action-row">
      <button class="btn-cta" onclick="location.href='add-students.html'">
        🧑‍💼<br>Add Student
      </button>

      <button class="btn-cta" onclick="goToMarkAttendance()">
        ✅<br>Mark Attendance
      </button>

      <button class="btn-cta" onclick="location.href='marks.html'">
        🧑‍🎓<br>Marks & Prediction
      </button>

      <button class="btn-cta" onclick="location.href='top-bunkers.html'">
        🕵️<br>Low Attendance
      </button>
    </div>
  </div>

  <div class="card">
    <h3>Class Summary</h3>
    <p style="color:var(--muted)">Select a class to view data.</p>

    <div style="margin-top:14px;">
      <span class="badge">
        Students: <span id="studentsCount">—</span>
      </span>
    </div>
  </div>

</div>

<!-- 🔹 TABLE -->
<div class="card" style="margin-top:18px;">
  <h3>Students</h3>

  <div class="table-wrap">
    <table id="studentsTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Class</th>
          <th>Absences</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<p class="footer">Developed by <strong>Rishu Jaswar</strong></p>

</main>
</div>

<!-- Scripts -->
<script type="module" src="./firebase.js"></script>
<script type="module" src="./script.js"></script>


<!-- Debugger -->
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

</body>
</html>
