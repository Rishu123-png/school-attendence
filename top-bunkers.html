<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#6a7cff">
  <title>Top Bunkers — Clean Rebuild</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
<div class="page"><main class="container">
<header class="header">
  <div class="brand"><div class="logo"><img src="./assets/logo.png" class="brand-logo" alt="Logo"></div><div><h2>Top Bunkers</h2><p id="schoolMeta">Loading school…</p></div></div>
  <div class="top-controls"><button id="themeToggle" class="btn-ghost" type="button">☀️ Light</button><button id="backBtn" class="btn-ghost" type="button">Back</button><button id="logoutBtn" class="btn-ghost" type="button">Logout</button></div>
</header>
<section class="hero-shell"><div class="hero-copy"><div class="eyebrow">Bunk Intelligence</div><h1>Class-wise and subject-wise bunk summary</h1><p>Track repeated bunks by class, section and subject using real subject-slot absences.</p></div><div class="hero-visual"><div class="orb-wrap"><div class="orb"></div></div></div></section>
<div class="card">
  <h3>Filters</h3>
  <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));">
    <div><label>Class</label><select id="bunkerClassFilter"><option value="">-- All classes --</option></select></div>
    <div><label>Section</label><select id="bunkerSectionFilter"><option value="">-- All sections --</option></select></div>
    <div><label>Subject</label><select id="bunkerSubjectFilter"><option value="">-- All subjects --</option></select></div>
    <div class="action-row" style="align-items:end;"><button id="bunkersRefreshBtn" class="btn-ghost" type="button">Refresh</button><button id="bunkersExportBtn" class="btn-cta" type="button">Export CSV</button></div>
  </div>
</div>
<div class="card"><h3>Repeated Subject Bunks</h3><div class="table-wrap"><table id="bunkersTable"><thead><tr><th>#</th><th>Student</th><th>Class</th><th>Section</th><th>Subject</th><th>Bunk Count</th><th>Last Date</th><th>Last Period</th></tr></thead><tbody></tbody></table></div></div>
<div id="toastHost"></div>
</main></div>
<script type="module" src="./scripts/top-bunkers.js"></script>
</body>
</html>
