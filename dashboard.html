<!doctype html>
<html>
<head>
<button id="menuToggle" class="menu-btn">
  <span></span>
  <span></span>
  <span></span>
</button>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard — School Attendance</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="initDashboardPage()">

<!-- Overlay -->
<div id="overlay" class="overlay"></div>

<div id="sidebar" class="sidebar">

  <!-- 🔰 PROFILE HEADER -->
  <div class="sidebar-profile">
    <img src="file_00000000c03c7209b1ecb68f6232b521 (1).png" class="sidebar-logo">

    <div>
      <h3 id="teacherName">Loading...</h3>
      <p class="sidebar-role">Teacher Panel</p>
    </div>
  </div>

  <!-- MENU -->
  <div class="sidebar-menu">
    <button onclick="location.href='dashboard.html'">🏠 Dashboard</button>
    <button onclick="location.href='attendance.html'">📅 Attendance</button>
    <button onclick="location.href='marks.html'">📊 Marks</button>
  </div>

  <!-- FOOTER -->
  <div class="sidebar-footer">
    <button id="themeToggle">🌗 Toggle Theme</button>
  </div>

</div>

<div class="page">
    <main class="container">
     <header class="header">
       <div class= "brand">
        <div class="logo">
       <img src="file_00000000c03c7209b1ecb68f6232b521 (1).png" class=" brand-logo">
</div>
          <div>
            <h1>Welcome, <span id="teacherName">Teacher</span></h1>
            <p style="color:var(--muted)">Subject: <strong id="teacherSubject">—</strong></p>
          </div>
        </div>

        <div class="top-controls">
          <select id="classSelect" style="min-width:160px; background:rgba(255,255,255,0.03); color:#fff; border-radius:10px; padding:8px;">
            <option value="">-- Select class --</option>
          </select>
          
        </div>
      </header>

      <div class="grid">
        <div class="card">
          <h3>Quick Actions</h3>
          <p> Add students, mark attendance and manage marks.</p>
          <div class="action-row">
            <button class="btn-cta" onclick="location.href='add-students.html'">🧑‍💼|<br> Add Student </button>
<button class="btn-cta" onclick="goToMarkAttendance()">✅| <br>Mark Attendance</button>

            
            <button class="btn-cta" onclick="location.href='marks.html'">🧑‍🎓| <br>Marks & Prediction</button>
            <button class="btn-cta" onclick="location.href='top-bunkers.html'">🕵️| <br>Top Bunkers</button>
<button class="btn-cta" onclick="logout()">Logout</button>
          </div>
        </div>

        <div class="card">
          <h3>Class Summary</h3>
          <p style="color:var(--muted)">Select a class to view enrolled students and absences.</p>
          <div style="margin-top:14px;">
            <span class="badge">Students: <span id="studentsCount">—</span></span>
          </div>
        </div>
      </div>

      <div class="card" style="margin-top:18px;">
        <h3>Students</h3>
        <div class="table-wrap">
          <table id="studentsTable">
            <thead><tr><th>Name</th><th>Class</th><th>Absences</th><th>Actions</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <p class="footer">Developed by<strong>😁 Rishu Jaswar</strong></p>
    </main>
  </div>

  <script type="module" src="./firebase.js"></script>
<script type="module" src="./script.js"></script>

</body>
</html>
