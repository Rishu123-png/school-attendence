<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#6b6cff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.webmanifest">
  <title>Add Student</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="initAddStudentsPage()">

<!-- ☰ Menu Button -->
<button id="menuToggle" class="menu-btn">⋮</button>
<!-- Overlay -->
<div id="sidebarOverlay" class="sidebar-overlay"></div>
<!-- Sidebar -->
<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <img src="file_000000000b80720891a13f8f2b0b0935.png" class="sidebar-logo" alt="Logo">
    <h3 id="teacherName">Teacher Name</h3>
    <p id="teacherSubject">Subject</p>
  </div>
  <div class="sidebar-menu">
    <button data-page="add-student" onclick="location.href='add-students.html'">🧑‍💼 Add Student</button>
    <button data-page="dashboard"   onclick="location.href='dashboard.html'">🏠 Dashboard</button>
    <button data-page="attendance"  onclick="location.href='mark-attendance.html'">📅 Attendance</button>
    <button data-page="marks"       onclick="location.href='marks.html'">📊 Marks</button>
    <button id="themeToggle">🌙 Toggle Theme</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>
</div>

<main class="container">
  <header class="header">
    <div>
      <h2>🧑‍💼 Add Student</h2>
      <p style="color:var(--muted)">Subject: <strong id="teacherSubjectAdd"></strong></p>
    </div>
    <div class="top-controls">
      <button class="btn-cta" onclick="location.href='dashboard.html'">⬅ Back</button>
    </div>
  </header>

  <div class="card">
    <label class="label" style="display:block;margin-bottom:6px;">Class</label>
    <select id="classSelectAdd" style="width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);color:#fff;margin-bottom:14px;">
      <option value="">-- Select class --</option>
    </select>

    <label class="label" style="display:block;margin-bottom:6px;">Student Name</label>
    <input id="studentName" placeholder="Enter student name"
      style="width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);color:#fff;font-size:14px;outline:none;"
      onkeydown="if(event.key==='Enter') addStudent()">

    <div style="margin-top:16px;">
      <button onclick="addStudent()" class="btn-cta">💾 Save Student</button>
    </div>
  </div>

  <p class="footer">Developed by <strong>Rishu Jaswar</strong></p>
</main>

<script type="module" src="./firebase.js"></script>
<script type="module" src="./script.js"></script>
<script src="./pwa-register.js"></script>
</body>
</html>
