<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#6b6cff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.webmanifest">
  <title>Teacher Assignments</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">
  <main class="container">
    <header class="header">
      <div>
        <h1>🧩 Teacher Assignments</h1>
        <p id="assignmentsManageSchoolId">Loading school…</p>
      </div>
      <div class="top-controls">
        <button class="btn-cta" id="assignmentsBackToAdminBtn">🛡️ School Admin</button>
      </div>
    </header>

    <div class="card">
      <h3>Assign Teacher to Class + Subject</h3>
      <form id="assignmentForm">
        <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;">
          <div>
            <label class="label">Teacher</label>
            <select id="assignmentTeacherSelect" required>
              <option value="">-- Select teacher --</option>
            </select>
          </div>
          <div>
            <label class="label">Class</label>
            <select id="assignmentClassSelect" required>
              <option value="">-- Select class --</option>
            </select>
          </div>
          <div>
            <label class="label">Subject</label>
            <select id="assignmentSubjectSelect" required>
              <option value="">-- Select subject --</option>
            </select>
          </div>
        </div>
        <div class="action-row">
          <button type="submit" class="btn-cta">➕ Save Assignment</button>
          <button type="button" class="btn-ghost" id="assignmentsRefreshBtn">🔄 Refresh</button>
        </div>
      </form>
    </div>

    <div class="card" style="margin-top:16px;">
      <h3>Assignment Records</h3>
      <div class="table-wrap">
        <table id="assignmentsTable">
          <thead>
            <tr>
              <th>Teacher</th>
              <th>Class</th>
              <th>Subject</th>
              <th>Status</th>
              <th>ID</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

      <p class="footer">Developed by <strong>Rishu Jaswar</strong></p>
  </main>
</div>

<script type="module" src="./firebase.js"></script>
<script type="module" src="./teacher-assignments.js"></script>
<script src="./pwa-register.js"></script>
</body>
</html>
