<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#6a7cff">
  <title>Teacher Schedule — School OS</title>
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="manifest" href="./manifest.json">
  <script>
    (function(){
      var t = localStorage.getItem("rebuild-theme") || "dark";
      if (t === "light") document.documentElement.classList.add("light-mode");
    })();
  </script>
</head>
<body class="has-bottom-nav">

<div id="offlineBanner">⚠️ You are offline.</div>
<div id="pageLoadOverlay"><div class="loader-ring"></div></div>
<div id="toastHost"></div>

<div class="page">
  <main class="container">
    <header class="header">
      <div class="brand">
        <div class="logo">📅</div>
        <div>
          <h2 id="teacherName">Schedule</h2>
          <p id="teacherMeta" style="font-size:13px;">Loading…</p>
        </div>
      </div>
      <div class="top-controls">
        <button id="themeToggle" class="btn-ghost" type="button">☀️ Light</button>
        <button id="logoutBtn" class="btn-ghost" type="button">Logout</button>
      </div>
    </header>

    <nav class="breadcrumb" id="breadcrumb">
      🏠 <a href="./teacher-home.html">Teacher Home</a> <span>›</span> Schedule
    </nav>

    <div class="card" style="margin-bottom:16px;">
      <h3>🔎 Select Teacher & Date</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-top:14px;">
        <div>
          <label>Teacher</label>
          <select id="scheduleTeacherSelect"><option value="">-- Select teacher --</option></select>
        </div>
        <div>
          <label>Date</label>
          <input id="scheduleDateInput" type="date">
        </div>
        <div>
          <label>Day</label>
          <input id="scheduleDayInput" type="text" readonly placeholder="Auto-detected">
        </div>
      </div>
      <div class="action-row" style="margin-top:12px;">
        <button id="scheduleRefreshBtn" class="btn-cta" type="button">🔄 Load Schedule</button>
      </div>
    </div>

    <div class="card" id="nextClassCard" style="display:none;margin-bottom:16px;border-left:4px solid var(--accent-a);">
      <h3>⏰ Next / Current Class</h3>
      <div class="summary-chips" style="margin-top:10px;">
        <span class="summary-chip" id="nextClassLabel">Class: —</span>
        <span class="summary-chip" id="nextTimeLabel">Time: —</span>
        <span class="summary-chip" id="nextSubjectLabel">Subject: —</span>
        <span class="summary-chip" id="nextRoomLabel">Room: —</span>
      </div>
      <div class="action-row" style="margin-top:14px;">
        <button id="nextAttendanceBtn" class="btn-cta" type="button">📌 Mark This Attendance</button>
      </div>
    </div>

    <div class="card">
      <h3>📋 Schedule</h3>
      <div class="table-wrap mobile-stack-table">
        <table id="scheduleTable">
          <thead>
            <tr>
              <th>Class</th><th>Day</th><th>Period</th><th>Time</th>
              <th>Type</th><th>Subject</th><th>Room</th><th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <p class="footer">School OS v2.0 &nbsp;·&nbsp; <strong>Rishu Jaswar</strong></p>
  </main>
</div>

<nav class="bottom-nav">
  <a href="#" id="nav-home"><span class="nav-icon">🏠</span>Home</a>
  <a href="#" id="nav-schedule" class="active"><span class="nav-icon">📅</span>Schedule</a>
  <a href="#" id="nav-attendance"><span class="nav-icon">✅</span>Attendance</a>
  <a href="#" id="nav-bunkers"><span class="nav-icon">🕵️</span>Bunkers</a>
  <a href="#" id="nav-marks"><span class="nav-icon">📊</span>Marks</a>
</nav>

<script type="module" src="./scripts/teacher-schedule.js"></script>

</html>
