<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#6a7cff">
  <title>School Setup — School OS</title>
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="manifest" href="./manifest.json">
  <script>(function(){var t=localStorage.getItem("rebuild-theme")||"dark";if(t==="light")document.documentElement.classList.add("light-mode");})()</script>
</head>
<body>
<div id="offlineBanner">⚠️ You are offline.</div>
<div id="pageLoadOverlay"><div class="loader-ring"></div></div>
<div id="toastHost"></div>

<div class="page">
  <main class="container">
    <header class="header">
      <div class="brand">
        <div class="logo">🏫</div>
        <div>
          <h2>School Setup</h2>
          <p style="font-size:13px;">Create your school workspace</p>
        </div>
      </div>
      <div class="top-controls">
        <button id="themeToggle" class="btn-ghost" type="button">☀️ Light</button>
        <button id="logoutBtn" class="btn-ghost" type="button">Logout</button>
      </div>
    </header>

    <section class="hero-shell">
      <div class="hero-copy">
        <div class="eyebrow">🚀 First Time Setup</div>
        <h1>Create your school workspace</h1>
        <p style="margin:10px 0 0;">This creates your admin identity, school profile, and connects everything to the same Firebase backend used by the teacher app.</p>
      </div>
      <div class="hero-visual"><div class="orb-wrap"><div class="orb"></div></div></div>
    </section>

    <div class="card">
      <h3>🏫 School Details</h3>
      <form id="schoolSetupForm" style="display:grid;gap:16px;margin-top:18px;">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;">
          <div>
            <label for="schoolName">School Name *</label>
            <input id="schoolName" type="text" placeholder="e.g. St. Mary's School" required>
          </div>
          <div>
            <label for="schoolCode">School Code</label>
            <input id="schoolCode" type="text" placeholder="e.g. SMS-001">
          </div>
          <div>
            <label for="adminName">Admin Name *</label>
            <input id="adminName" type="text" placeholder="Your full name" required>
          </div>
          <div>
            <label for="adminEmail">Admin Email *</label>
            <input id="adminEmail" type="email" placeholder="admin@school.com" required>
          </div>
          <div>
            <label for="phone">Phone</label>
            <input id="phone" type="tel" placeholder="+91 98765 43210">
          </div>
          <div>
            <label for="city">City</label>
            <input id="city" type="text" placeholder="e.g. Delhi">
          </div>
          <div>
            <label for="state">State</label>
            <input id="state" type="text" placeholder="e.g. Delhi">
          </div>
          <div>
            <label for="website">Website</label>
            <input id="website" type="url" placeholder="https://school.com">
          </div>
        </div>
        <div class="action-row">
          <button id="schoolSetupSubmitBtn" class="btn-cta" type="submit">🏫 Create School Workspace</button>
        </div>
      </form>
    </div>

    <p class="footer">School OS v2.0 &nbsp;·&nbsp; <strong>Rishu Jaswar</strong></p>
  </main>
</div>
<script type="module" src="./scripts/school-setup.js"></script>

</html>
