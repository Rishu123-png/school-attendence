<!doctype html>
<html>
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Analytics</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="initAnalyticsPage()">

  <!-- ☰ Menu Button -->
  <button id="menuToggle" class="menu-btn">⋮</button>

  <!-- Overlay -->
  <div id="sidebarOverlay" class="sidebar-overlay"></div>

  <!-- Sidebar -->
  <div id="sidebar" class="sidebar">
    <main class="container">
      <div class="sidebar-header">
        <img src="file_000000000b80720891a13f8f2b0b0935.png" class="sidebar-logo">
        <h3 id="teacherName">Teacher Name</h3>
        <p id="teacherSubject">Subject</p>
      </div>
      <div class="sidebar-menu">
        <button data-page="add-student" onclick="location.href='add-students.html'">
          🧑‍💼 Add Student
        </button>
        <button data-page="dashboard" onclick="location.href='dashboard.html'">🏠 Dashboard</button>
        <button data-page="attendance" onclick="location.href='mark-attendance.html'">📅 Attendance</button>
        <button data-page="marks" onclick="location.href='marks.html'">📊 Marks</button>
        <button id="themeToggle">🌙 Toggle Theme</button>
        <button onclick="logout()">🚪 Logout</button>
      </div>
    </main>
  </div>

   <main class="container">
    <header class="header">
        <div>
          <h1>Attendance Analytics</h1>
          <p>Monthly &amp; subject-based</p>
        </div>
    </header>

    <div class="card">
      <label for="analyticsClassSelect">Class</label>
      <select id="analyticsClassSelect"></select>
      <label for="analyticsMonth">Month</label>
      <input id="analyticsMonth" type="month">
      <div style="margin-top:10px;" class="row">
        <button class="btn-cta" onclick="renderAnalytics()">Show Charts</button>
        <button class="btn-cta" onclick="location.href='mark-attendance.html'">Back</button>
      </div>
    </div>

    <div id="chartsArea" style="margin-top:12px;"></div>

    <p class="footer">Developed by<strong> Rishu Jaswar</strong></p>
  </main>

  <script type="module" src="./firebase.js"></script>
  <script type="module" src="./script.js"></script>
<script type="module" src="./auth-check.js"></script>
  <script type="module">
    import { initTheme } from "./theme.js";
    import { initSidebar } from "./sidebar.js";
    window.addEventListener("DOMContentLoaded", () => {
      initTheme();
      initSidebar();
    });
  </script>
<div class="global-loader">
  <div class="loader-spinner"></div>
</div>
</body>
</html>
