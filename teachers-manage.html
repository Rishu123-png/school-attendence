<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#6a7cff">
  <title>Teachers — Clean Rebuild</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
<div class="page"><main class="container">
<header class="header">
  <div class="brand"><div class="logo"><img src="./assets/logo.png" class="brand-logo" alt="Logo"></div><div><h2>Teachers</h2><p id="schoolMeta">Loading school…</p></div></div>
  <div class="top-controls"><button id="themeToggle" class="btn-ghost" type="button">☀️ Light</button><button id="backBtn" class="btn-ghost" type="button">Back</button><button id="logoutBtn" class="btn-ghost" type="button">Logout</button></div>
</header>
<section class="hero-shell"><div class="hero-copy"><div class="eyebrow">Teacher Registry</div><h1>Manage teacher identities cleanly</h1><p>Each teacher can be linked to a real Firebase Auth UID and then routed into the future teacher app flow.</p></div><div class="hero-visual"><div class="orb-wrap"><div class="orb"></div></div></div></section>
<div class="card">
  <h3>Add / Edit Teacher</h3>
  <form id="teacherForm" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));">
    <div><label>Name</label><input id="teacherNameInput" placeholder="Sandeep Sir"></div>
    <div><label>Email</label><input id="teacherEmailInput" type="email" placeholder="teacher@school.com"></div>
    <div><label>Firebase Auth UID</label><input id="teacherAuthUidInput" placeholder="Paste auth UID here"></div>
    <div><label>Primary Subject</label><input id="teacherSubjectInput" placeholder="Physics"></div>
    <div><label>Status</label><select id="teacherStatusInput"><option value="active">Active</option><option value="inactive">Inactive</option></select></div>
    <div class="action-row" style="grid-column:1/-1; margin-top:8px;"><button id="teacherSubmitBtn" class="btn-cta" type="submit">Save Teacher</button><button id="teacherCancelBtn" class="btn-ghost" type="button">Clear</button></div>
  </form>
</div>
<div class="card"><h3>Teacher List</h3><div class="table-wrap"><table id="teachersTable"><thead><tr><th>Name</th><th>Email</th><th>Subject</th><th>Auth UID</th><th>Status</th><th>Actions</th></tr></thead><tbody></tbody></table></div></div>
<div id="toastHost"></div>
</main></div>
<script type="module" src="./scripts/teachers-manage.js"></script>
</body>
</html>
