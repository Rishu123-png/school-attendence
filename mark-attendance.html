<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mark Attendance</title>
  <link rel="stylesheet" href="style.css">
</head>
<!-- FIX #8: Added initMarkAttendancePage via module script -->
<body onload="initMarkAttendancePage()">

<!-- FIX #10: Added sidebar HTML (was completely missing) -->
<button id="menuToggle" class="menu-btn">⋮</button>
<div id="sidebarOverlay" class="sidebar-overlay"></div>
<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <img src="file_000000000b80720891a13f8f2b0b0935.png" class="sidebar-logo" alt="Logo">
    <h3 id="teacherName">Teacher Name</h3>
    <p id="teacherSubject">Subject</p>
  </div>
  <div class="sidebar-menu">
    <button data-page="add-student" onclick="location.href='add-students.html'">🧑‍💼 Add Student</button>
    <button data-page="dashboard"   onclick="location.href='dashboard.html'">🏠 Dashboard</button>
    <button data-page="attendance"  onclick="location.href='mark-attendance.html'">📅 Attendance</button>
    <button data-page="marks"       onclick="location.href='marks.html'">📊 Marks</button>
    <button id="themeToggle">🌙 Toggle Theme</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>
</div>

<main class="container">
  <header class="header">
    <div>
      <!-- FIX #11: Removed deprecated <center> tags -->
      <h1>📅 Mark Attendance</h1>
      <p>Keep accurate daily records</p>
    </div>
    <div class="top-controls">
      <button class="btn-cta" onclick="location.href='dashboard.html'">⬅ Back</button>
    </div>
  </header>

  <!-- Class UI (rendered by script.js) -->
  <div id="classAttendanceUI" style="display:none; margin-top:6px;"></div>

  <!-- Single Student UI -->
  <div id="singleStudentUI" style="display:none; margin-top:6px;">
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
      <div>
        <strong>Student:</strong> <span id="studentNameLabel" style="color:#ff6bc4;font-size:16px;"></span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <label>Month:</label>
        <input id="monthPickerMark" type="month" onchange="loadMarkAttendanceMonth()"
          style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);color:#fff;">
      </div>
    </div>

    <div class="card" style="margin-top:12px;">
      <div class="table-wrap">
        <table id="markAttendanceTable">
          <thead><tr><th>Date</th><th>Status</th><th>Present</th><th>Absent</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">
      <button class="btn-cta" onclick="printReport()">🖨️ Print Report</button>
      <button class="btn-cta" onclick="exportAttendanceCSV()">📥 Export CSV</button>
      <button class="btn-cta" onclick="exportAttendanceExcel()">📊 Export Excel</button>
      <button class="btn-cta" onclick="openAnalyticsForStudent()">📈 Analytics</button>
      <button class="btn-cta" onclick="location.href='dashboard.html'">⬅ Back</button>
    </div>
  </div>

  <p class="footer">Developed by <strong>Rishu Jaswar</strong></p>
</main>
<!-- FIX #9: Removed stray </div> that was here -->

<script type="module" src="./firebase.js"></script>
<script type="module" src="./script.js"></script>
</body>
</html>
