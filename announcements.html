<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#6a7cff">
  <title>Announcements — School OS</title>
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="manifest" href="./manifest.json">
  <script>(function(){var t=localStorage.getItem("rebuild-theme")||"dark";if(t==="light")document.documentElement.classList.add("light-mode");})()</script>
</head>
<body>
<div id="offlineBanner">⚠️ You are offline.</div>
<div id="pageLoadOverlay"><div class="loader-ring"></div></div>
<div id="toastHost"></div>

<div class="page">
  <main class="container">
    <header class="header">
      <div class="brand">
        <div class="logo">📢</div>
        <div>
          <h2>Announcements</h2>
          <p id="schoolMeta" style="font-size:13px;">Loading…</p>
        </div>
      </div>
      <div class="top-controls">
        <button id="themeToggle" class="btn-ghost" type="button">☀️ Light</button>
        <button id="backBtn" class="btn-ghost" type="button">← Back</button>
        <button id="logoutBtn" class="btn-ghost" type="button">Logout</button>
      </div>
    </header>
    <nav class="breadcrumb">👨‍💼 <a href="#">Admin</a> <span>›</span> 📢 Announcements</nav>

    <div class="card" style="margin-bottom:18px;">
      <h3>➕ Post New Announcement</h3>
      <form id="announcementForm" style="display:grid;gap:14px;margin-top:16px;">
        <div>
          <label for="annTitle">Title *</label>
          <input id="annTitle" type="text" placeholder="e.g. Exam schedule changed">
        </div>
        <div>
          <label for="annBody">Message *</label>
          <textarea id="annBody" rows="4" placeholder="Write the full announcement here…" style="resize:vertical;"></textarea>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;">
          <div>
            <label for="annType">Type</label>
            <select id="annType">
              <option value="general">📋 General</option>
              <option value="exam">📝 Exam</option>
              <option value="event">🎉 Event</option>
              <option value="urgent">🚨 Urgent</option>
            </select>
          </div>
          <div>
            <label for="annTarget">Audience</label>
            <select id="annTarget">
              <option value="all">👥 All</option>
              <option value="teacher">👨‍🏫 Teachers</option>
              <option value="parent">👨‍👩‍👦 Parents</option>
            </select>
          </div>
        </div>
        <div class="action-row">
          <button id="annSubmitBtn" class="btn-cta" type="submit">📢 Post Announcement</button>
        </div>
      </form>
    </div>

    <div class="card" id="announcementsListCard">
      <h3>📋 All Announcements</h3>
      <div id="announcementsList" style="margin-top:14px;display:flex;flex-direction:column;gap:12px;">
        <div class="empty-state"><div class="empty-icon">📢</div><p>Loading…</p></div>
      </div>
    </div>

    <p class="footer">School OS v2.0 &nbsp;·&nbsp; <strong>Rishu Jaswar</strong></p>
  </main>
</div>
<script type="module" src="./scripts/announcements.js"></script>

</html>
