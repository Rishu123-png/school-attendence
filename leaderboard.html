<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#6a7cff">
  <title>Leaderboard — School OS</title>
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="manifest" href="./manifest.json">
  <script>(function(){var t=localStorage.getItem("rebuild-theme")||"dark";if(t==="light")document.documentElement.classList.add("light-mode");})()</script>
</head>
<body class="has-bottom-nav">
<div id="offlineBanner">⚠️ You are offline.</div>
<div id="pageLoadOverlay"><div class="loader-ring"></div></div>
<div id="toastHost"></div>

<div class="page">
  <main class="container">
    <header class="header">
      <div class="brand">
        <div class="logo">🏆</div>
        <div>
          <h2>Class Leaderboard</h2>
          <p id="pageMeta" style="font-size:13px;">Loading…</p>
        </div>
      </div>
      <div class="top-controls">
        <button id="themeToggle" class="btn-ghost" type="button">☀️ Light</button>
        <button id="backBtn" class="btn-ghost" type="button">← Back</button>
        <button id="logoutBtn" class="btn-ghost" type="button">Logout</button>
      </div>
    </header>
    <nav class="breadcrumb" id="breadcrumb">🏠 <a href="#">Home</a> <span>›</span> 🏆 Leaderboard</nav>

    <div class="card" style="margin-bottom:16px;">
      <h3>🎯 Filter</h3>
      <div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;align-items:flex-end;">
        <div style="flex:1;min-width:160px;">
          <label for="lbClassSelect">Class</label>
          <select id="lbClassSelect"><option value="">-- Select class --</option></select>
        </div>
        <button id="lbLoadBtn" class="btn-cta" type="button">🏆 Load Leaderboard</button>
        <button id="lbExportBtn" class="btn-ghost" type="button">📥 Export CSV</button>
      </div>
    </div>

    <!-- Top 3 podium -->
    <div id="podiumRow" style="display:none;margin-bottom:18px;">
      <div style="display:flex;align-items:flex-end;justify-content:center;gap:12px;flex-wrap:wrap;">
        <div id="podium2" class="card" style="text-align:center;min-width:140px;order:1;"></div>
        <div id="podium1" class="card" style="text-align:center;min-width:160px;order:0;border:2px solid var(--accent-a);"></div>
        <div id="podium3" class="card" style="text-align:center;min-width:140px;order:2;"></div>
      </div>
    </div>

    <div class="card">
      <h3>📋 Full Rankings</h3>
      <div class="table-wrap mobile-stack-table" style="margin-top:12px;">
        <table id="leaderboardTable">
          <thead><tr><th>Rank</th><th>Student</th><th>Roll</th><th>Section</th><th>Attendance %</th><th>Avg Marks %</th><th>Score</th><th>Status</th></tr></thead>
          <tbody><tr><td colspan="8"><div class="empty-state"><div class="empty-icon">🏆</div><p>Select a class and click Load Leaderboard.</p></div></td></tr></tbody>
        </table>
      </div>
    </div>

    <p class="footer">School OS v2.0 &nbsp;·&nbsp; <strong>Rishu Jaswar</strong></p>
  </main>
</div>

<nav class="bottom-nav">
  <a href="#" id="nav-home"><span class="nav-icon">🏠</span>Home</a>
  <a href="#" id="nav-schedule"><span class="nav-icon">📅</span>Schedule</a>
  <a href="#" id="nav-attendance"><span class="nav-icon">✅</span>Attendance</a>
  <a href="#" id="nav-bunkers"><span class="nav-icon">🕵️</span>Bunkers</a>
  <a href="#" id="nav-marks"><span class="nav-icon">📊</span>Marks</a>
</nav>

</html>
