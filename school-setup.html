<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#6a7cff">
  <title>School Setup — Clean Rebuild</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
<div class="page">
  <main class="container">
    <header class="header">
      <div class="brand">
        <div class="logo"><img src="./assets/logo.png" class="brand-logo" alt="Logo"></div>
        <div>
          <h2>School Setup</h2>
          <p>Create the first school admin workspace</p>
        </div>
      </div>
      <div class="top-controls">
        <button id="themeToggle" class="btn-ghost" type="button">☀️ Light</button>
        <button id="logoutBtn" class="btn-ghost" type="button">Logout</button>
      </div>
    </header>

    <section class="hero-shell">
      <div class="hero-copy">
        <div class="eyebrow">School Onboarding</div>
        <h1>Create a clean school workspace</h1>
        <p>This creates the admin identity, school profile, and the first school-scoped teacher/admin record in the clean architecture.</p>
      </div>
      <div class="hero-visual"><div class="orb-wrap"><div class="orb"></div></div></div>
    </section>

    <div class="card">
      <h3>School Details</h3>
      <form id="schoolSetupForm" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));">
        <div><label>School Name</label><input id="schoolName" required placeholder="Jaypee Public School"></div>
        <div><label>School Code</label><input id="schoolCode" required placeholder="JPS001"></div>
        <div><label>Admin Name</label><input id="adminName" required placeholder="Rishu Jaswar"></div>
        <div><label>Admin Email</label><input id="adminEmail" type="email" required placeholder="admin@school.com"></div>
        <div><label>Phone</label><input id="phone" placeholder="+91 ..."></div>
        <div><label>City</label><input id="city" placeholder="Greater Noida"></div>
        <div><label>State</label><input id="state" placeholder="Uttar Pradesh"></div>
        <div><label>Website</label><input id="website" placeholder="https://school.com"></div>
        <div class="action-row" style="grid-column:1/-1; margin-top:8px;">
          <button class="btn-cta" type="submit">Create School Workspace</button>
        </div>
      </form>
    </div>

    <div id="toastHost"></div>
  </main>
</div>

<script type="module" src="./scripts/school-setup.js"></script>
</body>
</html>
