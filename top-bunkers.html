<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#6b6cff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.webmanifest">
  <title>Low Attendance</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="initTopBunkersPage()">

<button id="menuToggle" class="menu-btn">⋮</button>
<div id="sidebarOverlay" class="sidebar-overlay"></div>
<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <img src="file_000000000b80720891a13f8f2b0b0935.png" class="sidebar-logo" alt="Logo">
    <h3 id="teacherName">Teacher Name</h3>
    <p id="teacherSubject">Subject</p>
  </div>
  <div class="sidebar-menu">
    <button data-page="add-student" onclick="location.href='add-students.html'">🧑‍💼 Add Student</button>
    <button data-page="dashboard"   onclick="location.href='dashboard.html'">🏠 Dashboard</button>
    <button data-page="attendance"  onclick="location.href='mark-attendance.html'">📅 Attendance</button>
    <button data-page="marks"       onclick="location.href='marks.html'">📊 Marks</button>
    <button id="themeToggle">🌙 Toggle Theme</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>
</div>

<main class="container">
  <header class="header">
    <div class="brand">
      <div class="logo">
        <img src="file_000000000b80720891a13f8f2b0b0935.png" class="brand-logo" alt="Logo">
      </div>
      <div>
        <h2>🕵️ Low Attendance</h2>
        <p style="color:var(--muted)">Students with highest absences</p>
      </div>
    </div>
    <div class="top-controls">
      <button class="btn-cta" onclick="location.href='dashboard.html'">⬅ Back</button>
      <button class="btn-cta" onclick="logout()">🚪 Logout</button>
    </div>
  </header>

  <div class="card">
    <div class="table-wrap">
      <table id="bunkersTable">
        <thead><tr><th>#</th><th>Name</th><th>Class</th><th>Subject</th><th>Absences</th><th>Status</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div style="margin-top:14px;">
      <button class="btn-cta" onclick="exportBunkersCSV()">📥 Export CSV</button>
    </div>
  </div>

  <p class="footer">Developed by <strong>Rishu Jaswar</strong></p>
</main>

<script type="module" src="./firebase.js"></script>
<script type="module" src="./script.js"></script>
<script src="./pwa-register.js"></script>
</body>
</html>
